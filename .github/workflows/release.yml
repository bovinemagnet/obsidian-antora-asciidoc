name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Confirm tag matches manifest version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$MANIFEST_VERSION" != "$TAG_NAME" ]; then
            echo "Tag $TAG_NAME does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Package release artefacts
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release/obsidian-antora-asciidoc
          cp main.js manifest.json styles.css release/obsidian-antora-asciidoc/
          cd release && zip -r "obsidian-antora-asciidoc-${TAG_NAME}.zip" obsidian-antora-asciidoc

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            release/obsidian-antora-asciidoc-${{ github.ref_name }}.zip
          generate_release_notes: true
